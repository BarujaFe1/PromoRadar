name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Collector tests ──
  collector-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/collector
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - run: pip install -r requirements.txt
      - run: pytest tests/ -v --tb=short

  # ── Parser tests ──
  parser-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/parser
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - run: pip install -r requirements.txt
      - run: pytest tests/ -v --tb=short

  # ── Frontend build ──
  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: services/frontend/package.json
      - run: npm install
      - run: npm run lint
      - run: npm run build

  # ── Docker build (validate Dockerfiles) ──
  docker-build:
    runs-on: ubuntu-latest
    needs: [collector-tests, parser-tests, frontend-build]
    steps:
      - uses: actions/checkout@v4
      - run: docker compose build --no-cache
